name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy Frontend to VPS
      uses: appleboy/ssh-action@v1.2.0

      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}

        script: |
            # Stop on any error immediately
            set -e

            cd /var/www/hr-system-demo-frontend

            # Ensure git pull always works cleanly
            git fetch origin main
            git reset --hard origin/main

            # Use correct Node version (adjust to your version)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 20

            # Clean, reproducible install
            npm ci

            # Ensure env file exists before building
            if [ ! -f .env ]; then
              echo "ERROR: .env file missing on VPS" && exit 1
            fi

            # Build with production env
            NODE_ENV=production npm run build

            # Reload nginx (graceful — no downtime)
            sudo systemctl reload nginx

            echo "✅ Deployment successful"
